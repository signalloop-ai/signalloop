<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">SignalLoop three-layer assessment architecture</title>
  <desc id="desc">Company and role context flows through an adaptive role blueprint, a constrained AI-assisted candidate workspace, evidence capture, and technical plus FAVO evaluation. Portals and dashboards are shown as delivery surfaces beneath the differentiated product layers.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d1b31"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12335d"/>
      <stop offset="1" stop-color="#0d2749"/>
    </linearGradient>
    <linearGradient id="cyanCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f4554"/>
      <stop offset="1" stop-color="#0b3341"/>
    </linearGradient>
    <linearGradient id="violetCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38285e"/>
      <stop offset="1" stop-color="#281e47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000814" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#5ea7ff"/>
    </marker>
    <style>
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #f4f8ff; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #a9bad1; }
      .eyebrow { font: 700 14px Inter, Arial, sans-serif; letter-spacing: 2px; }
      .card-title { font: 700 26px Inter, Arial, sans-serif; fill: #ffffff; }
      .body { font: 400 17px Inter, Arial, sans-serif; fill: #d6e1ef; }
      .small { font: 400 14px Inter, Arial, sans-serif; fill: #9eb2cb; }
      .pill { font: 600 14px Inter, Arial, sans-serif; fill: #d9e9ff; }
      .surface { font: 600 16px Inter, Arial, sans-serif; fill: #b8c8db; }
    </style>
  </defs>

  <rect width="1440" height="820" rx="28" fill="url(#background)"/>
  <circle cx="1280" cy="90" r="170" fill="#2563eb" opacity="0.08"/>
  <circle cx="110" cy="720" r="190" fill="#22d3ee" opacity="0.06"/>

  <text x="72" y="72" class="title">SignalLoop: the differentiated assessment architecture</text>
  <text x="72" y="105" class="subtitle">Adapt the role-level assessment. Constrain AI collaboration. Evaluate the work process.</text>

  <rect x="72" y="150" width="265" height="470" rx="22" fill="#0b1729" stroke="#29415f" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="190" class="eyebrow" fill="#7fb7ff">EMPLOYER CONTEXT</text>
  <text x="100" y="228" class="card-title">Define the role</text>
  <text x="100" y="273" class="body">Company profile</text>
  <text x="100" y="310" class="body">Job description</text>
  <text x="100" y="347" class="body">Role and seniority</text>
  <text x="100" y="384" class="body">Cognitive emphasis</text>
  <text x="100" y="421" class="body">Target duration</text>
  <line x1="100" y1="454" x2="309" y2="454" stroke="#29415f"/>
  <text x="100" y="490" class="small">Candidate resumes can inform</text>
  <text x="100" y="514" class="small">gaps and interview probes,</text>
  <text x="100" y="538" class="small">not scored question selection.</text>
  <rect x="100" y="565" width="183" height="32" rx="16" fill="#142a45"/>
  <text x="117" y="587" class="pill">Comparable by design</text>

  <line x1="337" y1="385" x2="388" y2="385" stroke="#5ea7ff" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="395" y="150" width="285" height="470" rx="22" fill="url(#blueCard)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="423" y="190" class="eyebrow" fill="#8fc4ff">1 · ADAPT</text>
  <text x="423" y="228" class="card-title">Role blueprint</text>
  <text x="423" y="273" class="body">Map the role to skills,</text>
  <text x="423" y="301" class="body">coverage and difficulty.</text>
  <rect x="423" y="335" width="229" height="92" rx="14" fill="#0c213e" stroke="#315f95"/>
  <text x="441" y="363" class="eyebrow" fill="#7fb7ff">TODAY</text>
  <text x="441" y="390" class="small">Match to supported, registered</text>
  <text x="441" y="413" class="small">assessment packs.</text>
  <rect x="423" y="449" width="229" height="112" rx="14" fill="#0c213e" stroke="#315f95"/>
  <text x="441" y="477" class="eyebrow" fill="#7fb7ff">FUTURE</text>
  <text x="441" y="504" class="small">Compose approved questions into</text>
  <text x="441" y="527" class="small">a reusable role-level blueprint.</text>
  <text x="441" y="550" class="small">Same blueprint, same cohort.</text>

  <line x1="680" y1="385" x2="731" y2="385" stroke="#5ea7ff" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="738" y="150" width="285" height="470" rx="22" fill="url(#cyanCard)" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="766" y="190" class="eyebrow" fill="#63e8f5">2 · CONSTRAIN</text>
  <text x="766" y="228" class="card-title">Candidate + AI</text>
  <text x="766" y="273" class="body">A realistic coding workspace</text>
  <text x="766" y="301" class="body">with a bounded collaborator.</text>
  <text x="766" y="350" class="body">• Candidate-visible context only</text>
  <text x="766" y="385" class="body">• One focused issue at a time</text>
  <text x="766" y="420" class="body">• Progressive disclosure</text>
  <text x="766" y="455" class="body">• Anti-decomposition guardrail</text>
  <text x="766" y="490" class="body">• No hidden evaluator artifacts</text>
  <rect x="766" y="536" width="189" height="38" rx="19" fill="#0a2d39" stroke="#238a97"/>
  <text x="788" y="561" class="pill">Coach, not autopilot</text>

  <line x1="1023" y1="385" x2="1074" y2="385" stroke="#5ea7ff" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1081" y="150" width="287" height="470" rx="22" fill="url(#violetCard)" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text x="1109" y="190" class="eyebrow" fill="#c4b5fd">3 · EVALUATE</text>
  <text x="1109" y="228" class="card-title">Evidence + FAVO</text>
  <text x="1109" y="273" class="body">Technical correctness plus</text>
  <text x="1109" y="301" class="body">observable working behavior.</text>
  <text x="1109" y="350" class="body">Frame</text>
  <text x="1186" y="350" class="small">constraints and risk</text>
  <text x="1109" y="391" class="body">Ask</text>
  <text x="1186" y="391" class="small">focused AI questions</text>
  <text x="1109" y="432" class="body">Verify</text>
  <text x="1186" y="432" class="small">tests and edge cases</text>
  <text x="1109" y="473" class="body">Own</text>
  <text x="1186" y="473" class="small">decisions and tradeoffs</text>
  <rect x="1109" y="520" width="221" height="54" rx="14" fill="#241b40" stroke="#6d5aad"/>
  <text x="1129" y="543" class="small">Code + tests + prompts +</text>
  <text x="1129" y="565" class="small">snapshots + submission review</text>

  <rect x="72" y="670" width="1296" height="92" rx="20" fill="#0a1424" stroke="#263a55" stroke-width="2"/>
  <text x="100" y="705" class="eyebrow" fill="#7186a0">DELIVERY SURFACES · IMPORTANT, BUT NOT THE DIFFERENTIATOR</text>
  <text x="100" y="741" class="surface">Super Admin Portal</text>
  <circle cx="294" cy="735" r="4" fill="#425b78"/>
  <text x="320" y="741" class="surface">Employer Portal</text>
  <circle cx="474" cy="735" r="4" fill="#425b78"/>
  <text x="500" y="741" class="surface">Candidate Workspace</text>
  <circle cx="704" cy="735" r="4" fill="#425b78"/>
  <text x="730" y="741" class="surface">Evidence Reports</text>
  <circle cx="912" cy="735" r="4" fill="#425b78"/>
  <text x="938" y="741" class="surface">Dashboards and Administration</text>
</svg>
